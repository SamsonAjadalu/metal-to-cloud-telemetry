server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # React Router fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy map assets from DigitalOcean Spaces to avoid CORS issues
    # This MUST be checked before the static asset cache rule below
    location /maps/ {
        proxy_pass https://metal-to-cloud-telemetry-space.tor1.digitaloceanspaces.com/maps/;
        proxy_set_header Host metal-to-cloud-telemetry-space.tor1.digitaloceanspaces.com;
        proxy_ssl_server_name on;

        # Allow browser to use these resources freely (images on canvas, fetch YAML, etc.)
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=3600";
    }

    # Cache static assets (excluding /maps/ which is reverse-proxied above)
    location ~* ^(?!/maps/).*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
}
