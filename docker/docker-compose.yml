# Sim stack — runs the same launch as locally:
#   ros2 launch robot_bridge stack_sim_nav2.launch.py
# (defaults: headless Gazebo, no RViz; override with env vars below.)
#
# From repo root:
#   docker compose -f docker/docker-compose.yml up --build
#
# Gazebo GUI in a browser (noVNC, default port 6080):
#   docker compose -f docker/docker-compose.yml --profile web-gui up --build
#
# Linux host + `network_mode: host` is recommended for ROS 2 discovery.

services:
  stack-sim:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: metal-stack-sim:local
    network_mode: host
    privileged: true
    shm_size: "2gb"
    environment:
      FASTDDS_BUILTIN_TRANSPORTS: UDPv4
      TURTLEBOT3_MODEL: burger
      USE_WEB_GUI: "0"
      HEADLESS: "true"
      USE_RVIZ: "false"

  stack-sim-web:
    profiles: ["web-gui"]
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: metal-stack-sim:local
    network_mode: host
    privileged: true
    shm_size: "2gb"
    environment:
      FASTDDS_BUILTIN_TRANSPORTS: UDPv4
      TURTLEBOT3_MODEL: burger
      USE_WEB_GUI: "1"
      HEADLESS: "false"
      USE_RVIZ: "false"
      VNC_PASSWORD: "${VNC_PASSWORD:-rosdocker}"
      NOVNC_PORT: "6080"
