version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: robot_admin
      POSTGRES_PASSWORD: secret_password
      POSTGRES_DB: metal_to_cloud
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://robot_admin:secret_password@db:5432/metal_to_cloud
    depends_on:
      - db

volumes:
  pg_data: