name: Deploy Metal-to-Cloud Stack

on:
  push:
    branches:
      - prod

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build API Image
        run: |
          docker build -t wofa/m2c-api:latest ./backend
          docker push wofa/m2c-api:latest

      - name: Build Frontend Image
        run: |
          docker build -t wofa/m2c-frontend:latest ./frontend
          docker push wofa/m2c-frontend:latest

  deploy-to-swarm:
    name: Deploy to DigitalOcean
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: deploy_user
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd ~/metal-to-cloud-telemetry
            git pull origin prod
            ./deploy.sh

            docker service update \
              --image wofa/m2c-api:latest m2c-stack_api \
              --update-failure-action rollback \
              --update-monitor 180s \
              --update-max-failure-ratio 0.5 \
              --force

            docker service update \
              --image wofa/m2c-frontend:latest m2c-stack_frontend \
              --update-failure-action rollback \
              --update-monitor 60s \
              --update-max-failure-ratio 0.5 \
              --force